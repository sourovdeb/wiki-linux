<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki OpenWebUI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
    }
    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #a78bfa;
      flex: 1;
    }
    .btn {
      background: #2d2d4e;
      color: #c4b5fd;
      border: none;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #3d3d6e; }
    .btn.primary { background: #5b21b6; color: #fff; }
    .btn.primary:hover { background: #6d28d9; }

    /* ── Quick actions ── */
    #quick-bar {
      display: flex;
      gap: 5px;
      padding: 6px 10px;
      background: #111122;
      border-bottom: 1px solid #1e1e3a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .qa {
      background: #1e1e3a;
      color: #94a3b8;
      border: 1px solid #2d2d4e;
      border-radius: 14px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .qa:hover { background: #2d2d4e; color: #e2e8f0; border-color: #5b21b6; }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      gap: 10px;
      padding: 4px 10px;
      background: #0a0a1a;
      border-bottom: 1px solid #1e1e3a;
      font-size: 10px;
      color: #64748b;
      flex-shrink: 0;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }

    /* ── Frame ── */
    #frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Overlay (shown on load error) ── */
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #0f0f0f;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      text-align: center;
    }
    #overlay.active { display: flex; }
    #overlay p { color: #64748b; font-size: 13px; line-height: 1.6; }
    #overlay .big { font-size: 36px; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>⚡ Wiki OpenWebUI</h1>
  <button class="btn" id="btn-kb" title="Open Knowledge Base">KB</button>
  <button class="btn" id="btn-reload" title="Reload">↻</button>
  <button class="btn primary" id="btn-open-tab" title="Open in new tab">⬡</button>
</div>

<div id="quick-bar">
  <span class="qa" data-path="/workspace/knowledge">📚 Knowledge</span>
  <span class="qa" data-path="/">💬 Chat</span>
  <span class="qa" data-path="/workspace/prompts">📝 Prompts</span>
  <span class="qa" data-path="/workspace/tools">🔧 Tools</span>
  <span class="qa" data-path="/admin/settings">⚙ Settings</span>
</div>

<div id="status-bar">
  <span id="s-webui"><span class="dot yellow" id="dot-webui"></span>WebUI…</span>
  <span id="s-kb"><span class="dot yellow" id="dot-kb"></span>KB…</span>
  <span id="s-model"><span class="dot yellow" id="dot-model"></span>Model…</span>
</div>

<div id="frame-wrap">
  <iframe id="webui-frame" src="http://127.0.0.1:8080/" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation"></iframe>
  <div id="overlay">
    <span class="big">🔌</span>
    <p>OpenWebUI is not reachable at<br><strong>http://127.0.0.1:8080</strong></p>
    <button class="btn primary" id="btn-retry">Retry</button>
    <p style="font-size:11px; margin-top:6px;">Start it with:<br><code>systemctl --user start wiki-openwebui</code></p>
  </div>
</div>

<script src="panel.js"></script>
</body>
</html>
