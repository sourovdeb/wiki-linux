/* ---------- Date utils (no deps) ---------- */
const D = {
  today: () => new Date(2026, 4, 5),
  fmt: (d, fmt) => {
    const m=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    if(fmt==="MMMM yyyy") return `${m[d.getMonth()]} ${d.getFullYear()}`;
    if(fmt==="EEE") return wd[d.getDay()];
    if(fmt==="d") return d.getDate();
    if(fmt==="ymd") return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    return d.toString();
  },
  add: (d, n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; },
  sow: (d) => { const x=new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; },
  som: (d) => new Date(d.getFullYear(), d.getMonth(), 1),
  eom: (d) => new Date(d.getFullYear(), d.getMonth()+1, 0),
  addM: (d, n) => new Date(d.getFullYear(), d.getMonth()+n, 1),
  same: (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(),
  sameMo: (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth(),
};

const Toast = createContext(null);
function ToastProvider({children}){
  const [msgs, setMsgs] = useState([]);
  const push = (text, kind="ok") => {
    const id = Math.random().toString(36).slice(2);
    setMsgs(m => [...m, {id,text,kind}]);
    setTimeout(()=>setMsgs(m => m.filter(x=>x.id!==id)), 3200);
  };
  return (
    <Toast.Provider value={push}>
      {children}
      <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-2">
        {msgs.map(m => (
          <div key={m.id}
            className={`px-4 py-2.5 rounded-lg shadow-lg border text-sm font-medium animate-[slideIn_.2s_ease] ${m.kind==="ok"?"bg-white text-gray-900 border-gray-200":m.kind==="err"?"bg-red-50 text-red-800 border-red-200":"bg-blue-50 text-blue-800 border-blue-200"}`}>
            {m.text}
          </div>
        ))}
      </div>
      <style>{`@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
    </Toast.Provider>
  );
}
const useToast = () => useContext(Toast);

/* ---------- Reusable bits ---------- */
const Pill = ({status}) => {
  const map = {
    published:{bg:"bg-emerald-50", t:"text-emerald-700", b:"border-emerald-200", label:"Published", dot:"bg-emerald-500"},
    scheduled:{bg:"bg-sky-50", t:"text-sky-700", b:"border-sky-200", label:"Scheduled", dot:"bg-sky-500"},
    draft:{bg:"bg-gray-100", t:"text-gray-700", b:"border-gray-200", label:"Draft", dot:"bg-gray-400"},
  };
  const s = map[status] || map.draft;
  return <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium border ${s.bg} ${s.t} ${s.b}`}>
    <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}/>{s.label}
  </span>;
};
const Btn = ({children, kind="default", size="md", className="", icon, ...props}) => {
  const sizes = { sm:"h-7 px-2.5 text-[12px]", md:"h-8 px-3 text-[12.5px]", lg:"h-9 px-4 text-[13px]" };
  const kinds = {
    primary:"bg-gray-900 text-white hover:bg-black border border-gray-900",
    accent:"text-white hover:opacity-95 border",
    default:"bg-white text-gray-800 hover:bg-gray-50 border border-gray-200",
    ghost:"text-gray-600 hover:bg-gray-100 border border-transparent",
    danger:"bg-red-50 text-red-700 hover:bg-red-100 border border-red-200",
  };
  const accentStyle = kind==="accent" ? {background:"var(--accent)", borderColor:"var(--accent)"} : null;
  return <button {...props} style={accentStyle} className={`inline-flex items-center gap-1.5 rounded-md font-medium transition-colors ${sizes[size]} ${kinds[kind]} ${className}`}>
    {icon && <span className="w-3.5 h-3.5 inline-grid place-items-center">{icon}</span>}{children}
  </button>;
};
const Card = ({children, className="", style={}}) => (
  <div className={`bg-white rounded-xl border shadow-sm ${className}`} style={{borderColor:"var(--line)", ...style}}>{children}</div>
);

            <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>What automations and humans did today</div>

          <Btn kind="ghost" size="sm" icon={I.eye}>View all logs</Btn>

        <ul className="text-[12.5px] divide-y" style={{borderColor:"var(--line-soft)"}}>
          {[

            {t:"Post published", d:"“A 5-minute guide to schema.org for blogs” — by Tom Reyes", w:"human", time:"2 h ago"},

/* ---------- Posts ---------- */
function PostsPage({posts, setPosts, openEditor}){
  const toast = useToast();
  const [sel, setSel] = useState([]);
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const [busy, setBusy] = useState(null);

  const visible = posts.filter(p => (filter==="all"||p.status===filter) && p.title.toLowerCase().includes(q.toLowerCase()));
  const allSel = visible.length>0 && sel.length===visible.length;

  const toggleAll = () => setSel(allSel? [] : visible.map(p=>p.id));
  const toggle = id => setSel(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);

  const bulkPublish = () => {
    setPosts(ps => ps.map(p => sel.includes(p.id) ? {...p, status:"published", date:D.fmt(D.today(),"ymd")} : p));
    toast(`Published ${sel.length} post${sel.length>1?"s":""}.`);
    setSel([]);
  };
  const bulkSchedule = () => {
    setPosts(ps => ps.map(p => sel.includes(p.id) ? {...p, status:"scheduled"} : p));
    toast(`Scheduled ${sel.length} for May 14, 9:00 AM.`);
    setSel([]);
  };
  const bulkAutoSeo = () => {
    setBusy("bulk");
    setTimeout(() => {
      setPosts(ps => ps.map(p => sel.includes(p.id) ? {...p, seo: Math.max(p.seo, 80+Math.floor(Math.random()*15)), tags:[...new Set([...p.tags,"AI"])]} : p));
      toast(`AI rewrote SEO for ${sel.length} drafts.`);
      setSel([]); setBusy(null);
    }, 1500);
  };
  const aiOne = (id) => {
    setBusy(id);
    setTimeout(() => {
      setPosts(ps => ps.map(p => p.id===id ? {...p, seo: 88, tags:[...new Set([...p.tags,"AI"])], desc: p.desc || "Auto-generated meta description from local LLM."} : p));
      setBusy(null);
      toast("Meta + tags filled by Ollama.");
    }, 1400);
  };

  return (
    <div className="max-w-[1300px] mx-auto p-6 flex flex-col gap-4 h-full">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-[11px] font-semibold uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>Library</div>
          <h2 className="text-[20px] font-semibold tracking-tight">All posts</h2>
        </div>
        <Btn kind="primary" icon={I.plus}>New post</Btn>
      </div>

      <Card className="flex flex-col overflow-hidden flex-1">
        <div className="px-4 py-3 border-b flex items-center justify-between" style={{borderColor:"var(--line)"}}>
          <div className="flex items-center gap-2">
            <div className="relative">
              <span className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5" style={{color:"var(--ink-mute)"}}>{I.search}</span>
              <input value={q} onChange={e=>setQ(e.target.value)} className="h-8 pl-8 pr-3 w-60 bg-white border rounded-md text-[12.5px] focus:outline-none focus:ring-2 focus:ring-gray-200" placeholder="Search posts…" style={{borderColor:"var(--line)"}}/>
            </div>
            <div className="flex items-center bg-gray-100 rounded-md p-0.5 text-[12px]">
              {["all","draft","scheduled","published"].map(s => (
                <button key={s} onClick={()=>setFilter(s)} className={`px-2.5 h-7 rounded-[5px] capitalize font-medium transition-colors ${filter===s?"bg-white shadow-sm text-gray-900":"text-gray-600 hover:text-gray-900"}`}>{s}</button>
              ))}
            </div>
            <Btn size="sm" kind="ghost" icon={I.filter}>Filters</Btn>
          </div>
          {sel.length>0 && (
            <div className="flex items-center gap-1 px-1.5 py-1 rounded-md border" style={{borderColor:"var(--line)", background:"var(--accent-soft)"}}>
              <span className="text-[12px] font-semibold px-2" style={{color:"var(--accent)"}}>{sel.length} selected</span>
              <span className="w-px h-4" style={{background:"var(--line)"}}/>
              <Btn size="sm" kind="ghost" icon={I.globe} onClick={bulkPublish}>Publish</Btn>
              <Btn size="sm" kind="ghost" icon={I.cal} onClick={bulkSchedule}>Schedule</Btn>
              <Btn size="sm" kind="ghost" icon={I.tag}>Tag</Btn>
              <Btn size="sm" kind="ghost" icon={I.bot} onClick={bulkAutoSeo} disabled={busy==="bulk"}>{busy==="bulk"?"Working…":"Auto SEO"}</Btn>
              <span className="w-px h-4" style={{background:"var(--line)"}}/>
              <Btn size="sm" kind="ghost" className="text-red-600" icon={I.trash}>Delete</Btn>
            </div>
          )}
        </div>

        <div className="flex-1 overflow-auto">
          <table className="min-w-full text-[13px]">
            <thead className="bg-gray-50 sticky top-0 z-[1] border-b" style={{borderColor:"var(--line)"}}>
              <tr className="text-left text-[11px] font-medium uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>
                <th className="px-4 py-2.5 w-10"><Checkbox checked={allSel} onChange={toggleAll}/></th>
                <th className="px-4 py-2.5">Title</th>
                <th className="px-4 py-2.5 w-28">Status</th>
                <th className="px-4 py-2.5 w-44">SEO</th>
                <th className="px-4 py-2.5 w-52">Tags</th>
                <th className="px-4 py-2.5 w-32">Date</th>
                <th className="px-4 py-2.5 w-12"></th>
              </tr>
            </thead>
            <tbody className="divide-y" style={{borderColor:"var(--line-soft)"}}>
              {visible.map(p => (
                <tr key={p.id} className={`group hover:bg-gray-50 transition-colors ${sel.includes(p.id)?"bg-blue-50/40":""}`}>
                  <td className="px-4 py-3"><Checkbox checked={sel.includes(p.id)} onChange={()=>toggle(p.id)}/></td>
                  <td className="px-4 py-3">
                    <div className="flex flex-col gap-0.5">
                      <button onClick={()=>openEditor(p.id)} className="font-medium text-left hover:underline truncate max-w-[420px]">{p.title}</button>
                      <div className="text-[11.5px] flex items-center gap-2" style={{color:"var(--ink-mute)"}}>
                        <span>by {p.author}</span>
                        {p.status==="draft" && (
                          <button onClick={()=>aiOne(p.id)} disabled={busy===p.id}
                            className="inline-flex items-center gap-1 px-1.5 h-5 rounded text-[10px] font-bold" style={{background:"oklch(0.96 0.02 290)", color:"oklch(0.45 0.16 290)"}}>
                            {busy===p.id ? <><span className="w-2 h-2 rounded-full border border-current border-t-transparent animate-spin"/>Working…</> : <><span className="w-3 h-3">{I.bot}</span>Auto SEO</>}
                          </button>
                        )}
                      </div>
                    </div>
                  </td>
                  <td className="px-4 py-3"><Pill status={p.status}/></td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="flex-1 h-1.5 rounded-full bg-gray-100 overflow-hidden">
                        <div className="h-full rounded-full transition-[width] duration-700" style={{width:`${p.seo}%`, background: p.seo>=80?"var(--good)":p.seo>=60?"var(--warn)":"var(--bad)"}}/>
                      </div>
                      <span className="text-[11.5px] tabular-nums font-medium" style={{color:"var(--ink-soft)"}}>{p.seo}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex flex-wrap gap-1">
                      {p.tags.map(t => (
                        <span key={t} className={`inline-flex items-center px-1.5 py-0.5 rounded text-[10.5px] font-medium border ${t==="AI"?"":""}`} style={t==="AI"?{background:"oklch(0.96 0.03 290)", color:"oklch(0.45 0.16 290)", borderColor:"oklch(0.9 0.04 290)"}:{background:"#f3f4f6", color:"#4b5563", borderColor:"#e5e7eb"}}>{t}</span>
                      ))}
                    </div>
                  </td>
                  <td className="px-4 py-3 text-[12px]" style={{color:"var(--ink-soft)"}}>{p.date}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={()=>openEditor(p.id)} className="p-1 rounded hover:bg-gray-200 text-gray-500 hover:text-gray-900"><span className="w-3.5 h-3.5">{I.edit}</span></button>
                      <button className="p-1 rounded hover:bg-gray-200 text-gray-500 hover:text-gray-900"><span className="w-3.5 h-3.5">{I.more}</span></button>
                    </div>
                  </td>
                </tr>
              ))}
              {visible.length===0 && (
                <tr><td colSpan={7} className="px-4 py-12 text-center text-[12.5px]" style={{color:"var(--ink-mute)"}}>No posts match.</td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="px-4 py-2.5 border-t flex items-center justify-between text-[12px]" style={{borderColor:"var(--line)", color:"var(--ink-mute)"}}>
          <span>Showing {visible.length} of {posts.length} posts</span>
          <div className="flex items-center gap-1">
            <Btn size="sm" kind="ghost" icon={I.chL}>Prev</Btn>
            <Btn size="sm" kind="ghost">Next <span className="w-3.5 h-3.5">{I.chR}</span></Btn>
          </div>
        </div>
      </Card>
    </div>
  );
}

const Checkbox = ({checked, onChange}) => (
  <button onClick={onChange} className={`w-4 h-4 rounded border grid place-items-center transition-colors ${checked?"":"bg-white hover:border-gray-400"}`} style={checked?{background:"var(--accent)", borderColor:"var(--accent)"}:{borderColor:"var(--line)"}}>
    {checked && <span className="w-2.5 h-2.5 text-white">{I.check}</span>}
  </button>
);

/* ---------- Editor (drawer) ---------- */
function Editor({post, posts, setPosts, onClose}){
  const toast = useToast();
  const [tab, setTab] = useState("content");
  const [draft, setDraft] = useState(post);
  const [aiBusy, setAiBusy] = useState(false);

  useEffect(()=>setDraft(post), [post]);

  const save = (newStatus) => {
    setPosts(ps => ps.map(p => p.id===draft.id ? {...draft, status:newStatus||draft.status} : p));
    toast(newStatus==="published"?"Published.":newStatus==="scheduled"?"Scheduled.":"Draft saved.");
    onClose();
  };

  const runAi = () => {
    setAiBusy(true);
    setTimeout(()=>{
      setDraft(d => ({...d, focus:d.focus||"editorial calendar", desc:d.desc||"A practical look at editorial calendars and what makes them stick beyond the first month.", seo:88, tags:[...new Set([...d.tags,"AI"])]}));
      setAiBusy(false);
      toast("Local LLM filled SEO fields.");
    }, 1500);
  };

  const seoChecks = [
    {ok:draft.focus.length>0, t:"Focus keyword set"},
    {ok:draft.desc.length>=120 && draft.desc.length<=160, t:`Meta description length (${draft.desc.length} chars, target 120–160)`},
    {ok:draft.title.length>=30 && draft.title.length<=70, t:`Title length (${draft.title.length} chars, target 30–70)`},
    {ok:draft.tags.length>=2, t:`At least 2 tags (${draft.tags.length})`},
    {ok:draft.title.toLowerCase().includes(draft.focus.toLowerCase()) && draft.focus.length>0, t:"Focus keyword appears in title"},
  ];
  const seoPct = Math.round(seoChecks.filter(c=>c.ok).length / seoChecks.length * 100);

  return (
    <div className="fixed inset-0 z-40">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="absolute right-0 top-0 bottom-0 w-[760px] bg-white shadow-2xl flex flex-col animate-[slideR_.25s_ease]">
        <style>{`@keyframes slideR{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
        <div className="px-6 py-4 border-b flex items-center justify-between" style={{borderColor:"var(--line)"}}>
          <div className="min-w-0">
            <div className="text-[11px] font-semibold uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>Edit post · #{draft.id}</div>
            <div className="text-[15px] font-semibold truncate">{draft.title}</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md hover:bg-gray-100"><span className="w-4 h-4">{I.x}</span></button>
        </div>

        <div className="px-6 pt-3 border-b flex gap-1" style={{borderColor:"var(--line)"}}>
          {[
            {id:"content", label:"Content"},
            {id:"seo", label:"SEO"},
            {id:"social", label:"Social"},
          ].map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} className={`px-3 py-2 text-[12.5px] font-medium border-b-2 -mb-px transition-colors ${tab===t.id?"text-gray-900":"text-gray-500 hover:text-gray-900 border-transparent"}`} style={tab===t.id?{borderColor:"var(--accent)"}:{}}>{t.label}</button>
          ))}
        </div>

        <div className="flex-1 overflow-auto p-6 space-y-5">
          {tab==="content" && <>
            <Field label="Title">
              <input value={draft.title} onChange={e=>setDraft({...draft, title:e.target.value})} className="w-full px-3 py-2 border rounded-md text-[14px] focus:outline-none focus:ring-2 focus:ring-gray-300" style={{borderColor:"var(--line)"}}/>
            </Field>
            <Field label="URL slug">
              <div className="flex items-center gap-2">
                <span className="text-[12px] px-2 py-1.5 rounded bg-gray-100 font-mono" style={{color:"var(--ink-mute)"}}>site.local/</span>
                <input defaultValue={draft.title.toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,50)} className="flex-1 px-3 py-2 border rounded-md text-[13px] font-mono focus:outline-none focus:ring-2 focus:ring-gray-300" style={{borderColor:"var(--line)"}}/>
              </div>
            </Field>
            <Field label="Body">
              <textarea rows={10} defaultValue={"Open the editor to write your post here. PostFlow keeps the draft in sync with WordPress and pushes the publish state through the REST API when you click Publish."} className="w-full px-3 py-2 border rounded-md text-[13px] leading-relaxed focus:outline-none focus:ring-2 focus:ring-gray-300" style={{borderColor:"var(--line)"}}/>
            </Field>
            <Field label="Tags">
              <div className="flex flex-wrap gap-1.5 p-2 border rounded-md min-h-9" style={{borderColor:"var(--line)"}}>
                {draft.tags.map(t => (
                  <span key={t} className="inline-flex items-center gap-1 px-1.5 h-6 rounded bg-gray-100 text-[11.5px] font-medium">
                    {t}<button onClick={()=>setDraft({...draft, tags:draft.tags.filter(x=>x!==t)})} className="text-gray-400 hover:text-gray-700">×</button>
                  </span>
                ))}
                <input placeholder="Add tag…" className="flex-1 min-w-[80px] outline-none text-[12px] px-1"/>
              </div>
            </Field>
          </>}

          {tab==="seo" && <>
            <div className="rounded-xl p-5 border flex items-center gap-5" style={{borderColor:"var(--line)", background:"var(--accent-soft)"}}>
              <div className="relative w-16 h-16">
                <svg viewBox="0 0 36 36" className="w-16 h-16 -rotate-90">
                  <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth="3"/>
                  <circle cx="18" cy="18" r="15" fill="none" stroke="var(--accent)" strokeWidth="3" strokeLinecap="round" strokeDasharray={`${seoPct*0.94} 100`} className="transition-[stroke-dasharray] duration-700"/>
                </svg>
                <div className="absolute inset-0 grid place-items-center text-[14px] font-semibold tabular-nums">{seoPct}</div>
              </div>
              <div className="flex-1">
                <div className="text-[13px] font-semibold">SEO score</div>
                <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>{seoPct>=80?"Looking strong.":seoPct>=60?"Room to improve.":"Needs attention."}</div>
              </div>
              <Btn kind="accent" icon={I.bot} onClick={runAi} disabled={aiBusy}>{aiBusy?"Generating…":"Auto-fill with AI"}</Btn>
            </div>

            <Field label="Focus keyword">
              <input value={draft.focus} onChange={e=>setDraft({...draft, focus:e.target.value})} placeholder="e.g. editorial calendar" className="w-full px-3 py-2 border rounded-md text-[13px] focus:outline-none focus:ring-2 focus:ring-gray-300" style={{borderColor:"var(--line)"}}/>
            </Field>
            <Field label={`Meta description (${draft.desc.length}/160)`}>
              <textarea value={draft.desc} onChange={e=>setDraft({...draft, desc:e.target.value})} rows={3} className="w-full px-3 py-2 border rounded-md text-[13px] focus:outline-none focus:ring-2 focus:ring-gray-300" style={{borderColor:"var(--line)"}}/>
            </Field>

            <div>
              <div className="text-[12px] font-semibold mb-2">Search preview</div>
              <div className="border rounded-md p-3.5 bg-gray-50/40" style={{borderColor:"var(--line)"}}>
                <div className="text-[11.5px]" style={{color:"#1a73e8"}}>site.local › {draft.title.toLowerCase().split(" ").slice(0,3).join("-")}</div>
                <div className="text-[15px] font-medium leading-snug" style={{color:"#1a0dab"}}>{draft.title}</div>
                <div className="text-[12px] mt-0.5" style={{color:"#4d5156"}}>{draft.desc || "No meta description set."}</div>
              </div>
            </div>

            <div className="space-y-1.5">
              <div className="text-[12px] font-semibold">Checks</div>
              {seoChecks.map((c,i) => (
                <div key={i} className="flex items-center gap-2 text-[12.5px] py-1">
                  <span className={`w-4 h-4 rounded-full grid place-items-center ${c.ok?"bg-emerald-100 text-emerald-700":"bg-amber-100 text-amber-700"}`}>
                    <span className="w-2.5 h-2.5">{c.ok?I.check:I.alert}</span>
                  </span>
                  <span style={{color:c.ok?"var(--ink-soft)":"var(--ink)"}}>{c.t}</span>
                </div>
              ))}
            </div>
          </>}

          {tab==="social" && <>
            <Field label="Open Graph title">
              <input defaultValue={draft.title} className="w-full px-3 py-2 border rounded-md text-[13px]" style={{borderColor:"var(--line)"}}/>
            </Field>
            <Field label="Open Graph description">
              <textarea rows={3} defaultValue={draft.desc} className="w-full px-3 py-2 border rounded-md text-[13px]" style={{borderColor:"var(--line)"}}/>
            </Field>
            <div className="rounded-md border overflow-hidden" style={{borderColor:"var(--line)"}}>
              <div className="aspect-[1.91/1] bg-gradient-to-br from-gray-100 to-gray-200 grid place-items-center text-[11px]" style={{color:"var(--ink-mute)"}}>OG image preview · 1200×630</div>
              <div className="p-3 border-t" style={{borderColor:"var(--line)"}}>
                <div className="text-[11px] uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>site.local</div>
                <div className="text-[13px] font-medium">{draft.title}</div>
              </div>
            </div>
            <label className="flex items-center justify-between p-3 rounded-md border" style={{borderColor:"var(--line)"}}>
              <div>
                <div className="text-[13px] font-medium">Auto-share when published</div>
                <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>Sends to configured webhook (optional)</div>
              </div>
              <Toggle on/>
            </label>
          </>}
        </div>

        <div className="px-6 py-3 border-t flex items-center justify-between" style={{borderColor:"var(--line)"}}>
          <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>Last saved 2 min ago · auto-save on</div>
          <div className="flex items-center gap-2">
            <Btn onClick={()=>save("draft")}>Save draft</Btn>
            <Btn icon={I.cal} onClick={()=>save("scheduled")}>Schedule</Btn>
            <Btn kind="primary" icon={I.send} onClick={()=>save("published")}>Publish</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}
const Field = ({label, children}) => (
  <div className="space-y-1.5">
    <div className="text-[12px] font-semibold">{label}</div>
    {children}
  </div>
);
const Toggle = ({on, onChange}) => (
  <button onClick={onChange} className={`relative w-9 h-5 rounded-full transition-colors`} style={{background: on ? "var(--accent)" : "#d4d4d8"}}>
    <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${on?"translate-x-4":"translate-x-0.5"}`}/>
  </button>
);

/* ---------- Calendar ---------- */
function Calendar({posts, setPosts, openEditor}){
  const toast = useToast();
  const [cur, setCur] = useState(D.today());
  const [view, setView] = useState("month");
  const [drag, setDrag] = useState(null);

  const start = D.sow(D.som(cur));
  const cells = Array.from({length:42}, (_,i) => D.add(start, i));

  const onDrop = (date) => {
    if(!drag) return;
    const ymd = D.fmt(date,"ymd");
    setPosts(ps => ps.map(p => p.id===drag ? {...p, date:ymd, status: p.status==="draft" ? "scheduled" : p.status} : p));
    toast(`Rescheduled to ${ymd}.`);
    setDrag(null);
  };

  return (
    <div className="max-w-[1300px] mx-auto p-6 space-y-4 h-full flex flex-col">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-[11px] font-semibold uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>Editorial calendar</div>
          <h2 className="text-[20px] font-semibold tracking-tight">{D.fmt(cur,"MMMM yyyy")}</h2>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center bg-gray-100 rounded-md p-0.5">
            {["month","week","list"].map(v => (
              <button key={v} onClick={()=>setView(v)} className={`px-3 h-7 text-[12px] font-medium rounded-[5px] capitalize ${view===v?"bg-white shadow-sm":"text-gray-600 hover:text-gray-900"}`}>{v}</button>
            ))}
          </div>
          <div className="flex items-center gap-1">
            <Btn size="sm" kind="ghost" onClick={()=>setCur(D.addM(cur,-1))}><span className="w-3.5 h-3.5">{I.chL}</span></Btn>
            <Btn size="sm" kind="default" onClick={()=>setCur(D.today())}>Today</Btn>
            <Btn size="sm" kind="ghost" onClick={()=>setCur(D.addM(cur,1))}><span className="w-3.5 h-3.5">{I.chR}</span></Btn>
          </div>
          <Btn kind="primary" icon={I.plus}>Schedule post</Btn>
        </div>
      </div>

      <div className="flex items-center gap-3 text-[11.5px]" style={{color:"var(--ink-soft)"}}>
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-gray-400"/>Draft</span>
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-sky-500"/>Scheduled</span>
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-500"/>Published</span>
        <span className="ml-auto text-[11px]" style={{color:"var(--ink-mute)"}}>Drag a post to reschedule</span>
      </div>

      <Card className="overflow-hidden flex-1 flex flex-col">
        <div className="grid grid-cols-7 border-b text-center text-[11px] font-semibold uppercase tracking-wider bg-gray-50/50" style={{borderColor:"var(--line)", color:"var(--ink-mute)"}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => <div key={d} className="py-2.5">{d}</div>)}
        </div>
        <div className="grid grid-cols-7 flex-1 auto-rows-fr">
          {cells.map((d, i) => {
            const dayPosts = posts.filter(p => p.date===D.fmt(d,"ymd"));
            const isToday = D.same(d, D.today());
            const inMo = D.sameMo(d, cur);
            return (
              <div key={i}
                onDragOver={e=>e.preventDefault()}
                onDrop={()=>onDrop(d)}
                className={`border-r border-b p-1.5 transition-colors ${inMo?"bg-white":"bg-gray-50/50"} ${drag?"hover:bg-blue-50":""}`}
                style={{borderColor:"var(--line-soft)"}}>
                <div className="flex items-center justify-between mb-1">
                  <span className={`text-[11px] font-medium w-5 h-5 grid place-items-center rounded-full ${isToday?"bg-gray-900 text-white":""}`} style={{color:!inMo?"var(--ink-mute)":!isToday?"var(--ink)":"#fff"}}>{D.fmt(d,"d")}</span>
                  {dayPosts.length>0 && <span className="text-[9px] tabular-nums" style={{color:"var(--ink-mute)"}}>{dayPosts.length}</span>}
                </div>
                <div className="space-y-1">
                  {dayPosts.map(p => {
                    const c = p.status==="published"?{bg:"bg-emerald-50",b:"border-emerald-200",t:"text-emerald-800"}:p.status==="scheduled"?{bg:"bg-sky-50",b:"border-sky-200",t:"text-sky-800"}:{bg:"bg-gray-50",b:"border-gray-200",t:"text-gray-700"};
                    return (
                      <div key={p.id}
                        draggable onDragStart={()=>setDrag(p.id)} onDragEnd={()=>setDrag(null)}
                        onClick={()=>openEditor(p.id)}
                        title={p.title}
                        className={`text-[10.5px] px-1.5 py-1 rounded border cursor-grab active:cursor-grabbing truncate font-medium ${c.bg} ${c.b} ${c.t} hover:shadow-sm transition-shadow`}>
                        {p.title}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

                    <option>llama3.1:8b</option><option>mistral:7b</option><option>phi3</option><option>OpenAI: gpt-4o-mini (compatible)</option>
                  </select>
                </Field>
              </div>
              <Field label="System prompt">
                <textarea rows={4} defaultValue="You write SEO metadata for a tech blog. Given a draft, return JSON with: title (max 60 chars), meta_description (130–160 chars), focus_keyword, and 3–5 tags." className="w-full px-3 py-2 border rounded-md text-[12.5px] font-mono leading-relaxed" style={{borderColor:"var(--line)"}}/>
              </Field>
              <div className="grid grid-cols-3 gap-4">
                <Field label="Temperature"><Slider value={0.4}/></Field>
                <Field label="Max tokens"><input defaultValue="600" className="w-full px-3 py-2 border rounded-md text-[12.5px]" style={{borderColor:"var(--line)"}}/></Field>
                <Field label="Timeout (s)"><input defaultValue="20" className="w-full px-3 py-2 border rounded-md text-[12.5px]" style={{borderColor:"var(--line)"}}/></Field>
              </div>
            </div>
          </Card>
        </>}

        {tab==="scripts" && <>
          <SectionH title="Background scripts" sub="Drop in Python or Node scripts the automation engine can run."/>
          <div className="rounded-xl border-2 border-dashed p-6 text-center cursor-pointer hover:bg-gray-50 transition-colors" style={{borderColor:"var(--line)"}}>
            <div className="w-10 h-10 rounded-full bg-white border shadow-sm grid place-items-center mx-auto mb-2" style={{borderColor:"var(--line)"}}><span className="w-4 h-4">{I.upload}</span></div>
            <div className="text-[13px] font-semibold">Drop a .py or .js file</div>
            <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>or click to browse — runs in a sandboxed worker</div>
          </div>
          <div className="space-y-2">
            {[
              {n:"optimize_images.py", d:"Compress + convert PNG → WebP before media upload finishes", st:"running"},
              {n:"fetch_news_rss.py", d:"Pull RSS daily, draft summaries via LLM", st:"stopped"},
              {n:"sync_categories.js", d:"Mirror category tree to a static export", st:"running"},
            ].map((s,i) => (
              <Card key={i} className="px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3 min-w-0">
                  <span className={`w-8 h-8 rounded-md grid place-items-center flex-shrink-0 ${s.st==="running"?"bg-emerald-50 text-emerald-600":"bg-gray-100 text-gray-500"}`}><span className="w-4 h-4">{I.copy}</span></span>
                  <div className="min-w-0">
                    <div className="font-mono text-[12.5px] font-semibold truncate">{s.n}</div>
                    <div className="text-[11px] truncate" style={{color:"var(--ink-mute)"}}>{s.d}</div>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`text-[10.5px] px-2 py-0.5 rounded-full font-medium ${s.st==="running"?"bg-emerald-50 text-emerald-700":"bg-gray-100 text-gray-600"}`}>{s.st}</span>
                  <button className={`p-1.5 rounded-md ${s.st==="running"?"text-red-600 hover:bg-red-50":"text-emerald-600 hover:bg-emerald-50"}`}><span className="w-4 h-4">{s.st==="running"?I.power:I.play}</span></button>
                </div>
              </Card>
            ))}
          </div>
        </>}

        {tab==="features" && <>
          <SectionH title="Features" sub="Turn things off you don't use. The UI gets simpler."/>
          <Card className="p-2 divide-y" style={{borderColor:"var(--line-soft)"}}>
            {[
              {k:"seo", t:"Yoast / SEO editor", d:"Show focus keyword, meta description and live checks."},
              {k:"social", t:"Social sharing", d:"Auto-post to webhook (X / LinkedIn / Mastodon) on publish."},
              {k:"ai", t:"AI assistance", d:"Buttons for Auto SEO, draft rewrite, alt-text generation."},
              {k:"calendar", t:"Calendar view", d:"Editorial calendar with drag-to-reschedule."},
              {k:"bulk", t:"Bulk publishing", d:"Multi-select toolbar in the posts list."},
              {k:"recurring", t:"Recurring posts", d:"Re-publish weekly digest content automatically."},
            ].map(f => (
              <label key={f.k} className="flex items-center justify-between p-3 cursor-pointer hover:bg-gray-50 rounded-md">
                <div className="min-w-0">
                  <div className="text-[13px] font-semibold">{f.t}</div>
                  <div className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>{f.d}</div>
                </div>
                <Toggle on={features[f.k]} onChange={()=>setFeatures(x=>({...x, [f.k]:!x[f.k]}))}/>
              </label>
            ))}
          </Card>
          <div className="text-[11.5px] flex items-start gap-2 p-3 rounded-md" style={{background:"var(--accent-soft)", color:"oklch(0.35 0.1 250)"}}>
            <span className="w-3.5 h-3.5 mt-0.5">{I.alert}</span>
            <span>Disabled features stay configurable here — toggling them back on restores the saved state. No data is wiped.</span>
          </div>
        </>}

        {tab==="roles" && <>
          <SectionH title="User roles" sub="Map workspace roles to WordPress capabilities."/>
          <Card>
            <table className="w-full text-[12.5px]">
              <thead className="bg-gray-50 text-left text-[11px] uppercase tracking-wider" style={{color:"var(--ink-mute)"}}>
                <tr><th className="px-4 py-2.5">Role</th><th className="px-4 py-2.5 text-center">Edit</th><th className="px-4 py-2.5 text-center">Publish</th><th className="px-4 py-2.5 text-center">Schedule</th><th className="px-4 py-2.5 text-center">Manage rules</th><th className="px-4 py-2.5 text-center">Settings</th></tr>
              </thead>
              <tbody className="divide-y" style={{borderColor:"var(--line-soft)"}}>
                {[
                  {r:"Admin", p:[1,1,1,1,1]},
                  {r:"Editor", p:[1,1,1,1,0]},
                  {r:"Author", p:[1,0,0,0,0]},
                  {r:"Contributor", p:[1,0,0,0,0]},
                ].map(row => (
                  <tr key={row.r} className="hover:bg-gray-50">
                    <td className="px-4 py-3 font-medium">{row.r}</td>
                    {row.p.map((v,i) => (
                      <td key={i} className="px-4 py-3 text-center">
                        <span className={`inline-grid place-items-center w-5 h-5 rounded ${v?"bg-emerald-50 text-emerald-600":"bg-gray-100 text-gray-400"}`}><span className="w-3 h-3">{v?I.check:I.x}</span></span>
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </>}

        <div className="flex justify-end pt-4">
          <Btn kind="primary" icon={I.check}>Save {tabs.find(t=>t.id===tab)?.label.toLowerCase()}</Btn>
        </div>
      </div>
    </div>
  );
}
const SectionH = ({title, sub}) => (
  <div>
    <h2 className="text-[15px] font-semibold tracking-tight">{title}</h2>
    <p className="text-[11.5px]" style={{color:"var(--ink-mute)"}}>{sub}</p>
  </div>
);
const Slider = ({value=0.4}) => (
  <div className="flex items-center gap-2 h-9 px-1">
    <div className="relative flex-1 h-1.5 rounded-full bg-gray-200">
      <div className="absolute h-full rounded-full" style={{width:`${value*100}%`, background:"var(--accent)"}}/>
      <div className="absolute -top-1 w-3.5 h-3.5 rounded-full bg-white border-2 shadow" style={{left:`calc(${value*100}% - 7px)`, borderColor:"var(--accent)"}}/>
    </div>
    <span className="text-[11.5px] tabular-nums w-7 text-right" style={{color:"var(--ink-soft)"}}>{value.toFixed(2)}</span>
  </div>
);

/* ---------- App shell ---------- */
function App(){
  const [route, setRoute] = useState("dash");
  const [posts, setPosts] = useState(initialPosts);
  const [editorId, setEditorId] = useState(null);
  const [connected, setConnected] = useState(true);
  const [features, setFeatures] = useState({seo:true, social:false, ai:true, calendar:true, bulk:true, recurring:false});

  const titles = {
    dash:{t:"Dashboard", s:"Today, May 5 · Single site · 24 posts"},
    posts:{t:"Posts", s:`${posts.length} posts · ${posts.filter(p=>p.status==="draft").length} drafts open`},
    calendar:{t:"Calendar", s:"Drag posts to reschedule"},
    tags:{t:"Tags", s:"Taxonomy & auto-tag rules"},
    automation:{t:"Automations", s:"4 workflows · 3 active"},
    settings:{t:"Settings", s:"Connection, AI, features"},
  };

  const editorPost = posts.find(p => p.id===editorId);

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar route={route} setRoute={setRoute} connected={connected}/>
      <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <Topbar title={titles[route].t} subtitle={titles[route].s}
          actions={route==="posts" ? <Btn size="md" kind="accent" icon={I.plus}>New post</Btn> : null}/>
        <div className="flex-1 overflow-auto">
          {route==="dash" && <Dashboard posts={posts} setRoute={setRoute}/>}
          {route==="posts" && <PostsPage posts={posts} setPosts={setPosts} openEditor={setEditorId}/>}
          {route==="calendar" && <Calendar posts={posts} setPosts={setPosts} openEditor={setEditorId}/>}
          {route==="tags" && <TagsPage/>}
          {route==="automation" && <AutomationPage/>}
          {route==="settings" && <SettingsPage connected={connected} setConnected={setConnected} features={features} setFeatures={setFeatures}/>}
        </div>
      </main>
      {editorPost && <Editor post={editorPost} posts={posts} setPosts={setPosts} onClose={()=>setEditorId(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
